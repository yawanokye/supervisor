<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password | Virtual Professor</title><link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-body simple-auth">
  <main class="simple-auth-shell">
    <a class="brand" href="/login"><span class="brand-mark">Virtual</span><span><strong>Virtual Professor</strong><small>Extraordinary Supervisor</small></span></a>
    <section class="auth-form-card">
      <div class="auth-heading"><p class="eyebrow">Account recovery</p><h2>Reset your password</h2><p>Use the username and recovery PIN supplied when your lecturer account was created.</p></div>
      {% if flash %}<div class="flash flash-{{ flash.category }}">{{ flash.message }}</div>{% endif %}
      <form method="post" action="/forgot-password" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label class="field"><span>Username</span><input type="text" name="username" required></label>
        <label class="field"><span>Six-digit recovery PIN</span><input type="password" name="recovery_pin" inputmode="numeric" maxlength="6" required></label>
        <label class="field"><span>New password</span><input type="password" name="new_password" minlength="10" required><small>At least 10 characters, including letters and numbers.</small></label>
        <button class="primary-button" type="submit">Reset password</button>
      </form>
      <div class="auth-links"><a href="/login">Return to lecturer login</a></div>
    </section>
  </main>
</body>
</html>
