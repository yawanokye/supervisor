<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Change Password | Virtual Professor</title><link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-body simple-auth">
  <main class="simple-auth-shell">
    <a class="brand" href="/"><span class="brand-mark">VProf</span><span><strong>Virtual Professor</strong><small>Extraordinary Supervisor</small></span></a>
    <section class="auth-form-card">
      <div class="auth-heading"><p class="eyebrow">Account security</p><h2>Create a private password</h2><p>Temporary passwords must be changed before the portal can be used.</p></div>
      {% if flash %}<div class="flash flash-{{ flash.category }}">{{ flash.message }}</div>{% endif %}
      <form method="post" action="/account/password" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label class="field"><span>Current password</span><input type="password" name="current_password" required></label>
        <label class="field"><span>New password</span><input type="password" name="new_password" minlength="10" required></label>
        <label class="field"><span>Confirm new password</span><input type="password" name="confirm_password" minlength="10" required></label>
        <button class="primary-button" type="submit">Update password</button>
      </form>
    </section>
  </main>
</body>
</html>
