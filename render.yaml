services:
  - type: web
    name: projectready-supervisor
    runtime: python
    plan: starter
    buildCommand: python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: REVIEW_STORAGE_DIR
        value: /var/data/reviews
      - key: REVIEW_STORAGE_FALLBACK_DIR
        value: /tmp/projectready-supervisor/reviews
      - key: AUTO_RESUME_JOBS
        value: true
      - key: AI_CHAPTER_REVIEW_CONCURRENCY
        value: 4
      - key: AI_CHAPTER_PACKET_MAX_CHARS
        value: 120000
      - key: AI_CHAPTER_RECOVERY_CONCURRENCY
        value: 2
      - key: AI_CHAPTER_RECOVERY_MAX_OUTPUT_TOKENS
        value: 7000
      - key: AI_VERIFICATION_BATCH_SIZE
        value: 12
      - key: MAX_AUTO_RESUMES
        value: 4
      - key: AUTOMATIC_RETRY_DELAY_SECONDS
        value: 12
      - key: AUTOMATIC_RETRY_MAX_DELAY_SECONDS
        value: 90
      - key: AI_TIMEOUT_SECONDS
        value: 300
      - key: AI_MAX_RETRIES
        value: 2
      - key: AI_STRUCTURED_OUTPUT_RETRIES
        value: 1
      - key: AI_JOB_MAX_SECONDS
        value: 5400
      - key: AI_ADVANCED_SECOND_PASS
        value: true
      - key: JOB_HEARTBEAT_SECONDS
        value: 45
      - key: JOB_LEASE_SECONDS
        value: 240
      - key: OPENAI_CHAPTER_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_CHAPTER_REASONING_EFFORT
        value: high
      - key: OPENAI_EXPERT_MODEL
        value: gpt-5.4
      - key: OPENAI_EXPERT_REASONING_EFFORT
        value: high
      - key: OPENAI_FINAL_AUDIT_MODEL
        value: gpt-5.4
      - key: OPENAI_FINAL_AUDIT_REASONING_EFFORT
        value: high
      - key: OPENAI_EXTERNAL_DOMAIN_MODEL
        value: gpt-5.4
      - key: OPENAI_EXTERNAL_DOMAIN_REASONING_EFFORT
        value: high
      - key: OPENAI_EXTERNAL_ADJUDICATOR_MODEL
        value: gpt-5.4
      - key: OPENAI_EXTERNAL_ADJUDICATOR_REASONING_EFFORT
        value: xhigh
      - key: AI_MAX_PARALLEL_CALLS
        value: 4
      - key: AI_EXTERNAL_ASSESSMENT_STAGE_TIMEOUT_SECONDS
        value: 900
      - key: AI_EXTERNAL_ASSESSMENT_REQUEST_TIMEOUT_SECONDS
        value: 360
      - key: AI_EXTERNAL_ASSESSMENT_REQUEST_MAX_RETRIES
        value: 1
      - key: AI_EXTERNAL_ASSESSMENT_ADJUDICATION_MAX_OUTPUT_TOKENS
        value: 11000
      - key: TOKEN_ACCOUNTING_ENABLED
        value: true
      - key: TOKEN_QUOTA_ENFORCEMENT
        value: false
      - key: SUPERVISOR_DEFAULT_TOKEN_ALLOCATION
        value: 0
      - key: TOKEN_ESTIMATE_WORDS_PER_PAGE
        value: 450
      - key: TOKEN_RESERVE_MULTIPLIER
        value: 1.15
      - key: TOKENS_PER_PAGE_SUPERVISORY_LIGHT
        value: 2500
      - key: TOKENS_PER_PAGE_SUPERVISORY_STANDARD
        value: 3500
      - key: TOKENS_PER_PAGE_SUPERVISORY_ADVANCED
        value: 5000
      - key: TOKENS_PER_PAGE_EXTERNAL_ASSESSMENT
        value: 6500
    disk:
      name: supervisor-review-checkpoints
      mountPath: /var/data
      sizeGB: 10
