databases:
  - name: vprofessor-db
    plan: basic-256mb

services:
  - type: web
    name: vprofessor-web
    runtime: python
    plan: standard
    buildCommand: python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars: &vprofessorEnv
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: vprofessor-db
          property: connectionString
      - key: REVIEW_STORAGE_DIR
        value: /tmp/vprofessor/reviews
      - key: REVIEW_STORAGE_FALLBACK_DIR
        value: /tmp/vprofessor/reviews
      - key: VPROF_DB_ARTIFACT_STORAGE
        value: true
      - key: VPROF_RUN_JOBS_IN_WEB
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_REVIEW_ENABLED
        value: true
      - key: VPROF_ENABLE_OPENAI
        value: true
      - key: VPROF_ENABLE_DEEPSEEK
        value: false
      - key: VPROF_ENABLE_SELECTIVE_ESCALATION
        value: true
      - key: VPROF_ROUTING_PROFILE
        value: quality
      - key: VPROF_COMBINED_APP_PIPELINE
        value: true
      - key: VPROF_EXPERT_PROVIDER_MODE
        value: combined_openai_pipeline
      - key: VPROF_DEFAULT_CALL_BUDGET_USD
        value: 0.45
      - key: VPROF_EXTERNAL_CALL_BUDGET_USD
        value: 1.50
      - key: OPENAI_FAST_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_CLEANING_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_CHAPTER_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_SECTION_ANALYSIS_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_SECTION_ANALYSIS_FALLBACK_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_EXPERT_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_FINAL_AUDIT_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_FINAL_SYNTHESIS_MODEL
        value: gpt-5.6-terra
      - key: OPENAI_FINAL_SYNTHESIS_FALLBACK_MODEL
