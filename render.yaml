services:
  - type: web
    name: projectready-supervisor
    runtime: python
    plan: starter
    buildCommand: python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: REVIEW_STORAGE_DIR
        value: /tmp/projectready-supervisor/reviews
      - key: REVIEW_STORAGE_FALLBACK_DIR
        value: /tmp/projectready-supervisor/reviews
