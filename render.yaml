services:
  - type: web
    name: projectready-supervisor
    runtime: python
    plan: starter
    buildCommand: python -m pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: REVIEW_STORAGE_DIR
        value: /var/data/reviews
      - key: REVIEW_STORAGE_FALLBACK_DIR
        value: /tmp/projectready-supervisor/reviews
      - key: AUTO_RESUME_JOBS
        value: true
      - key: MAX_AUTO_RESUMES
        value: 3
      - key: JOB_HEARTBEAT_SECONDS
        value: 45
      - key: JOB_LEASE_SECONDS
        value: 240
      - key: AI_MAX_PARALLEL_CALLS
        value: 4
      - key: AI_EXTERNAL_ASSESSMENT_STAGE_TIMEOUT_SECONDS
        value: 600
      - key: AI_EXTERNAL_ASSESSMENT_REQUEST_TIMEOUT_SECONDS
        value: 240
      - key: AI_EXTERNAL_ASSESSMENT_REQUEST_MAX_RETRIES
        value: 0
    disk:
      name: supervisor-review-checkpoints
      mountPath: /var/data
      sizeGB: 10
